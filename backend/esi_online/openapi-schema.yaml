              $ref: '#/components/schemas/AdministrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdministrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdministrationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Administration'
          description: ''
