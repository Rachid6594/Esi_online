        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Administration.
        required: true
      tags:
      - Administration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdministrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdministrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdministrationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Administration'
          description: ''
    patch:
      operationId: administration_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Administration.
        required: true
      tags:
      - Administration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdministrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdministrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdministrationRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Administration'
          description: ''
    delete:
      operationId: administration_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Administration.
        required: true
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/auth/bibliothecaires/:
    get:
      operationId: auth_bibliothecaires_list
      description: Liste les utilisateurs staff non superuser.
      summary: Lister les bibliothécaires
      parameters:
      - in: query
        name: search
        schema:
          type: string
      tags:
      - Authentification
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffListItem'
          description: ''
  /api/auth/bibliothecaires/create/:
    post:
      operationId: auth_bibliothecaires_create_create
      description: Crée un compte bibliothécaire (staff).
      summary: Créer un bibliothécaire
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBibliothecaireRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateBibliothecaireRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateBibliothecaireRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Données invalides.
  /api/auth/invitation/set-password/:
    post:
      operationId: auth_invitation_set_password_create
      description: Met à jour le mot de passe utilisateur à partir du lien uid/token.
      summary: Définir le mot de passe via invitation
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordInvitationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetPasswordInvitationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetPasswordInvitationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Lien invalide ou données incorrectes.
  /api/auth/invitation/validate/:
    get:
      operationId: auth_invitation_validate_retrieve
      description: Vérifie que le couple uid/token est valide pour définir un mot
        de passe.
      summary: Valider un token d'invitation
      parameters:
      - in: query
        name: token
        schema:
          type: string
        required: true
      - in: query
        name: uid
        schema:
          type: string
        required: true
      tags:
      - Authentification
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationValidation'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationValidation'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authentifie un utilisateur et retourne les tokens JWT access/refresh.
      summary: Connexion par email
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Données invalides.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Identifiants invalides.
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Retourne l'utilisateur authentifié via JWT.
      summary: Profil utilisateur courant
      tags:
      - Authentification
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Utilisateur non authentifié.
  /api/auth/professeurs/:
    get:
      operationId: auth_professeurs_list
      description: Liste les comptes du groupe professeurs avec leurs matières.
