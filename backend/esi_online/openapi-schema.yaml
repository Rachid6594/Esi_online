openapi: 3.0.3
info:
  title: ESI-Online API
  version: 1.0.0
  description: Documentation OpenAPI des endpoints backend ESI-Online.
paths:
  /api/admin/:
    get:
      operationId: admin_list
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminList'
          description: ''
    post:
      operationId: admin_create
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
          description: ''
  /api/admin/{id}:
    get:
      operationId: admin_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Admin.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
          description: ''
    put:
      operationId: admin_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Admin.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
          description: ''
    patch:
      operationId: admin_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Admin.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
          description: ''
    delete:
      operationId: admin_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) Admin.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/administration/:
    get:
      operationId: administration_list
