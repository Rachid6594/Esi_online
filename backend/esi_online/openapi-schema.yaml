      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfesseurListItem'
          description: ''
  /api/auth/professeurs/create/:
    post:
      operationId: auth_professeurs_create_create
      description: Crée un compte professeur et l'associe aux matières demandées.
      summary: Créer un professeur
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfesseurRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateProfesseurRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateProfesseurRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Données invalides.
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Crée un utilisateur standard.
      summary: Inscription utilisateur
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Données invalides.
  /api/auth/students/:
    get:
      operationId: auth_students_list
      description: Liste les utilisateurs étudiants avec filtres de recherche.
      summary: Lister les étudiants
      parameters:
      - in: query
        name: classe_id
        schema:
          type: integer
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: ordering
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
      tags:
      - Authentification
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentListItem'
          description: ''
  /api/auth/students/create/:
    post:
      operationId: auth_students_create_create
      description: Crée un compte étudiant et envoie ses identifiants par email.
      summary: Créer un étudiant
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Données invalides.
  /api/auth/students/export/:
    get:
      operationId: auth_students_export_retrieve
      description: Exporte la liste des étudiants en fichier CSV avec les mêmes filtres
        que students_list.
      summary: Exporter les étudiants en CSV
      parameters:
      - in: query
        name: classe_id
        schema:
          type: integer
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: ordering
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
      tags:
      - Authentification
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Fichier CSV des étudiants.
  /api/auth/students/import-csv/:
    post:
      operationId: auth_students_import_csv_create
      description: Importe des comptes étudiants à partir d'un fichier CSV (file ou
        csv).
      summary: Importer des étudiants via CSV
      tags:
      - Authentification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportStudentsCsvRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImportStudentsCsvRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportStudentsCsvRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStudentsResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Fichier manquant ou invalide.
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
